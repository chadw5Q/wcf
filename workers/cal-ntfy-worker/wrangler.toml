# Standalone worker (not the Astro site). Deploy separately.
name = "cal-ntfy-worker"
main = "cal-ntfy-worker.js"
compatibility_date = "2026-04-02"

# Plaintext vars (committed so deploys do not wipe dashboard-only vars). Override here if needed.
[vars]
NTFY_TOPIC = "hedge-pickup-scheduled"

# Also set in Cloudflare Dashboard → Workers → cal-ntfy-worker → Settings → Variables:
#   NTFY_TOPIC = topic name (e.g. hedge-order) OR full https://ntfy.sh/... URL
#   NTFY_TOPIC_URL = optional full publish URL (overrides topic resolution)
#
# Optional secrets (wrangler secret put <NAME>):
#   NTFY_TOKEN              — Bearer token if ntfy topic is private
#   CAL_WEBHOOK_SECRET      — must match Cal.com webhook secret exactly (or omit both)
#   NTFY_SELF_TEST_SECRET   — enables POST /test-ntfy with X-Test-Secret header (verify ntfy)
